<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ChronoRoute V8</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:#c40000;
padding:15px;
text-align:center;
font-weight:bold;
}

#map{
height:300px;
}

.container{
padding:15px;
}

button{
padding:10px;
margin:5px;
border:none;
background:#c40000;
color:white;
border-radius:6px;
}

input,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

.stop{
background:#1c1c1c;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.status-pending{color:orange}
.status-delivered{color:lime}
.status-failed{color:red}

canvas{
background:white;
border-radius:4px;
}

</style>

</head>

<body>

<header>
ChronoRoute V8
</header>

<div id="map"></div>

<div class="container">

<h3>Nouvelle livraison</h3>

<input id="adresse" placeholder="Adresse">

<input id="client" placeholder="Client">

<input id="tel" placeholder="Téléphone">

<textarea id="note" placeholder="digicode, étage..."></textarea>

<button onclick="addStop()">Ajouter</button>

<hr>

<button onclick="nextStop()">➡ arrêt suivant</button>

<button onclick="shareTour()">Partager tournée</button>

<hr>

<h3>Tournée</h3>

<div id="stops"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>

const SAVE_KEY="chronoroute_v8"

let stops=JSON.parse(localStorage.getItem(SAVE_KEY))||[]

const geoCache={}

let map=L.map('map').setView([48.8566,2.35],11)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

let markerLayer=L.layerGroup().addTo(map)

function save(){
localStorage.setItem(SAVE_KEY,JSON.stringify(stops))
}

function addStop(){

let stop={
adresse:adresse.value,
client:client.value,
tel:tel.value,
note:note.value,
status:"pending"
}

stops.push(stop)

save()

render()

adresse.value=""
client.value=""
tel.value=""
note.value=""

}

function render(){

markerLayer.clearLayers()

const container=document.getElementById("stops")

container.innerHTML=""

stops.forEach((s,i)=>{

let div=document.createElement("div")
div.className="stop"

div.innerHTML=`

<b>${s.client}</b><br>

${s.adresse}<br>

${s.note}<br>

<span class="status-${s.status}">
${s.status}
</span>

<br><br>

<a href="tel:${s.tel}">
<button>📞 appeler</button>
</a>

<button onclick="navigate('${s.adresse}')">
🧭 navigation
</button>

<button onclick="markDelivered(${i})">
✅ livré
</button>

<button onclick="markFailed(${i})">
❌ échec
</button>

<input type="file" accept="image/*"
onchange="uploadPhoto(event,${i})">

<canvas id="sig${i}" width="300" height="100"></canvas>

<button onclick="saveSignature(${i})">
✍️ signature
</button>

`

container.appendChild(div)

let canvas=document.getElementById("sig"+i)

let pad=new SignaturePad(canvas)

s.pad=pad

geocodeAndMarker(s)

})

}

async function geocodeAndMarker(stop){

if(geoCache[stop.adresse]){

addMarker(geoCache[stop.adresse])

return

}

let url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(stop.adresse)

let r=await fetch(url)

let data=await r.json()

if(data.length){

let lat=data[0].lat
let lon=data[0].lon

geoCache[stop.adresse]=[lat,lon]

addMarker([lat,lon])

}

}

function addMarker(coords){

L.marker(coords).addTo(markerLayer)

}

function navigate(adresse){

let url="https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(adresse)

window.open(url)

}

function markDelivered(i){

stops[i].status="delivered"

save()

render()

}

function markFailed(i){

stops[i].status="failed"

save()

render()

}

function uploadPhoto(e,i){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(evt){

stops[i].photo=evt.target.result

save()

}

reader.readAsDataURL(file)

}

function saveSignature(i){

let data=stops[i].pad.toDataURL()

stops[i].signature=data

save()

alert("signature enregistrée")

}

function nextStop(){

let next=stops.find(s=>s.status==="pending")

if(!next){

alert("tournée terminée")

return

}

navigate(next.adresse)

}

function shareTour(){

let data=btoa(JSON.stringify(stops))

let url=location.origin+location.pathname+"?tour="+data

navigator.clipboard.writeText(url)

alert("lien copié")

}

render()

</script>

</body>
</html>
