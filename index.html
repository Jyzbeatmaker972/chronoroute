<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChronoRoute v4</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
    :root {
        --blue: #1A56DB;
        --blue-dark: #1342B0;
        --blue-light: #EBF2FF;
        --blue-mid: #C7DCFF;
        --bg: #F4F7FC;
        --surface: #FFFFFF;
        --border: #DDE5F0;
        --text: #0F1B2D;
        --text-mid: #4A5B75;
        --text-muted: #8FA3BE;
        --yellow: #FFD100;
        --yellow-dk: #F0C200;
        --success: #0DA874;
        --warning: #F59E0B;
        --danger: #E53E3E;
        --radius: 12px;
        --shadow: 0 2px 12px rgba(26, 86, 219, .10);
        --shadow-lg: 0 8px 32px rgba(26, 86, 219, .14);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    header {
        background: var(--blue);
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        flex-shrink: 0;
        box-shadow: 0 2px 16px rgba(26, 86, 219, .25);
        z-index: 300;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo-icon {
        width: 32px;
        height: 32px;
        background: var(--yellow);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, .15);
        flex-shrink: 0;
    }

    .logo-text {
        font-size: 17px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -.3px;
    }

    .logo-text span {
        font-weight: 400;
        font-size: 12px;
        color: rgba(255, 255, 255, .55);
        margin-left: 6px;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 7px;
    }

    .hpill {
        background: rgba(255, 255, 255, .15);
        border: 1px solid rgba(255, 255, 255, .2);
        border-radius: 20px;
        padding: 4px 11px;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
    }

    .prog-bar {
        height: 3px;
        background: var(--blue-mid);
        flex-shrink: 0;
    }

    .prog-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--yellow), var(--success));
        transition: width .6s cubic-bezier(.4, 0, .2, 1);
    }

    .app {
        flex: 1;
        display: grid;
        grid-template-columns: 350px 1fr;
        overflow: hidden;
        min-height: 0;
    }

    .sidebar {
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 2px 0 12px rgba(26, 86, 219, .06);
    }

    .sb-form {
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }

    .sb-form-title {
        font-size: 12px;
        font-weight: 700;
        color: var(--blue);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 11px;
    }

    .fg {
        margin-bottom: 8px;
    }

    .fg2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 8px;
    }

    label {
        display: block;
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: .8px;
        margin-bottom: 4px;
    }

    input, select {
        width: 100%;
        background: var(--bg);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        color: var(--text);
        outline: none;
        transition: border-color .2s, box-shadow .2s;
        -webkit-appearance: none;
    }

    input:focus, select:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(26, 86, 219, .1);
        background: #fff;
    }

    input::placeholder {
        color: var(--text-muted);
    }

    .btn {
        padding: 9px 14px;
        border-radius: 9px;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: all .18s cubic-bezier(.4, 0, .2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 100%;
    }

    .btn-add {
        background: var(--blue);
        color: #fff;
        box-shadow: 0 2px 8px rgba(26, 86, 219, .3);
    }

    .btn-add:hover {
        background: var(--blue-dark);
        transform: translateY(-1px);
    }

    .btn-optimize {
        background: var(--yellow);
        color: var(--text);
        font-size: 14px;
        padding: 11px;
        box-shadow: 0 2px 10px rgba(255, 209, 0, .35);
    }

    .btn-optimize:hover {
        background: var(--yellow-dk);
        transform: translateY(-1px);
    }

    .btn-optimize:disabled {
        opacity: .45;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    .btn-pdf {
        background: var(--bg);
        color: var(--blue);
        border: 1.5px solid var(--blue-mid);
    }

    .btn-pdf:hover {
        background: var(--blue-light);
    }

    .btn-reset {
        background: transparent;
        color: var(--text-muted);
        border: 1.5px solid var(--border);
        font-size: 12px;
        padding: 7px;
    }

    .btn-reset:hover {
        color: var(--danger);
        border-color: var(--danger);
    }

    .sb-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 7px;
    }

    .sb-list::-webkit-scrollbar {
        width: 4px;
    }

    .sb-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
    }

    .no-stops {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
        font-size: 13px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
    }

    .no-stops .ns-ico {
        font-size: 36px;
        opacity: .35;
    }

    .stop-card {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 11px 12px;
        transition: all .2s;
        animation: cardIn .28s cubic-bezier(.4, 0, .2, 1);
        position: relative;
        overflow: hidden;
    }

    @keyframes cardIn {
        from {
            opacity: 0;
            transform: translateY(-8px) scale(.98);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .stop-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--blue-mid);
        border-radius: 3px 0 0 3px;
        transition: background .3s;
    }

    .stop-card.s-livre::before {
        background: var(--success);
    }

    .stop-card.s-absent::before {
        background: var(--warning);
    }

    .stop-card.s-echec::before {
        background: var(--danger);
    }

    .stop-card:hover {
        border-color: var(--blue-mid);
        box-shadow: var(--shadow);
    }

    .sc-head {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 7px;
    }

    .sc-num {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--blue);
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .sc-info {
        flex: 1;
        min-width: 0;
    }

    .sc-name {
        font-weight: 600;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .sc-addr {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 1px;
    }

    .sc-del {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 15px;
        padding: 2px 5px;
        border-radius: 6px;
        transition: all .15s;
    }

    .sc-del:hover {
        color: var(--danger);
        background: rgba(229, 62, 62, .08);
    }

    .sc-tags {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-bottom: 8px;
    }

    .tag {
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 700;
    }

    .t-express {
        background: rgba(229, 62, 62, .1);
        color: var(--danger);
    }

    .t-fragile {
        background: rgba(139, 92, 246, .1);
        color: #7C3AED;
    }

    .t-standard {
        background: var(--bg);
        color: var(--text-muted);
    }

    .t-time {
        background: var(--blue-light);
        color: var(--blue);
    }

    .t-livre {
        background: rgba(13, 168, 116, .1);
        color: var(--success);
    }

    .t-absent {
        background: rgba(245, 158, 11, .1);
        color: var(--warning);
    }

    .t-echec {
        background: rgba(229, 62, 62, .1);
        color: var(--danger);
    }

    .sc-actions {
        display: flex;
        gap: 5px;
        margin-bottom: 8px;
    }

    .sa-btn {
        flex: 1;
        padding: 5px 6px;
        border-radius: 7px;
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        font-weight: 700;
        border: 1.5px solid transparent;
        cursor: pointer;
        transition: all .15s;
        text-align: center;
    }

    .sa-btn.livre {
        background: rgba(13, 168, 116, .08);
        color: var(--success);
        border-color: rgba(13, 168, 116, .2);
    }

    .sa-btn.absent {
        background: rgba(245, 158, 11, .08);
        color: var(--warning);
        border-color: rgba(245, 158, 11, .2);
    }

    .sa-btn.echec {
        background: rgba(229, 62, 62, .08);
        color: var(--danger);
        border-color: rgba(229, 62, 62, .2);
    }

    .sa-btn.active {
        filter: brightness(1.15);
        box-shadow: 0 2px 8px rgba(0, 0, 0, .1);
    }/* ── BOUTONS NAVIGATION ── */
    .sc-nav {
        display: flex;
        gap: 6px;
    }

    .nav-btn {
        flex: 1;
        padding: 7px 8px;
        border-radius: 8px;
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        text-decoration: none;
        transition: all .18s;
    }

    .nav-waze {
        background: #33CCFF;
        color: #fff;
        box-shadow: 0 2px 8px rgba(51, 204, 255, .3);
    }

    .nav-waze:hover {
        background: #1AB8E8;
        transform: translateY(-1px);
    }

    .nav-gmaps {
        background: #4285F4;
        color: #fff;
        box-shadow: 0 2px 8px rgba(66, 133, 244, .3);
    }

    .nav-gmaps:hover {
        background: #2A6FDB;
        transform: translateY(-1px);
    }

    .sb-footer {
        padding: 12px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 7px;
        flex-shrink: 0;
    }

    .main {
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .tabs {
        display: flex;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        padding: 0 4px;
    }

    .tab {
        padding: 12px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        color: var(--text-muted);
        border-bottom: 2px solid transparent;
        transition: all .2s;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .tab.active {
        color: var(--blue);
        border-bottom-color: var(--blue);
    }

    .map-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        position: relative;
    }

    .map-wrap.hidden {
        display: none;
    }

    #map {
        flex: 1;
        min-height: 0;
    }/* Popup Leaflet custom */
    .leaflet-popup-content-wrapper {
        border-radius: 12px !important;
        box-shadow: var(--shadow-lg) !important;
        border: 1.5px solid var(--border) !important;
        font-family: 'DM Sans', sans-serif !important;
        padding: 0 !important;
    }

    .leaflet-popup-content {
        margin: 0 !important;
    }

    .leaflet-popup-tip {
        background: #fff !important;
    }

    .popup-inner {
        padding: 13px 15px;
    }

    .popup-name {
        font-weight: 700;
        font-size: 13px;
        color: var(--text);
        margin-bottom: 3px;
    }

    .popup-addr {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 8px;
    }

    .popup-tags {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-bottom: 10px;
    }

    .popup-nav {
        display: flex;
        gap: 7px;
    }

    .popup-nav a {
        flex: 1;
        padding: 8px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 700;
        text-align: center;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        transition: all .15s;
    }

    .popup-nav .pw {
        background: #33CCFF;
        color: #fff;
    }

    .popup-nav .pg {
        background: #4285F4;
        color: #fff;
    }

    .btn-gps {
        position: absolute;
        bottom: 16px;
        right: 16px;
        z-index: 500;
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 46px;
        height: 46px;
        font-size: 20px;
        cursor: pointer;
        box-shadow: var(--shadow-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all .2s;
    }

    .btn-gps:hover {
        background: var(--blue-dark);
        transform: scale(1.08);
    }

    .route-panel {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .route-panel.hidden {
        display: none;
    }

    .route-panel::-webkit-scrollbar {
        width: 4px;
    }

    .route-panel::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
    }

    .summary-cards {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
    }

    .sum-card {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 8px;
        text-align: center;
        box-shadow: var(--shadow);
    }

    .sum-val {
        font-size: 26px;
        font-weight: 800;
        color: var(--blue);
        line-height: 1;
        font-family: 'DM Mono', monospace;
    }

    .sum-lbl {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: .8px;
        margin-top: 4px;
    }

    .route-info {
        background: var(--blue);
        color: #fff;
        border-radius: var(--radius);
        padding: 14px 16px;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        align-items: center;
        box-shadow: 0 4px 16px rgba(26, 86, 219, .25);
    }

    .ri-item {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 13px;
        font-weight: 500;
    }

    .ri-val {
        font-weight: 700;
        font-size: 15px;
    }

    .ri-badge {
        background: var(--yellow);
        color: var(--text);
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 800;
        margin-left: auto;
    }

    .route-steps {
        display: flex;
        flex-direction: column;
    }

    .rs {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding-bottom: 14px;
        position: relative;
        animation: rsIn .35s cubic-bezier(.4, 0, .2, 1) both;
    }

    @keyframes rsIn {
        from {
            opacity: 0;
            transform: translateX(12px);
        }

        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .rs:not(:last-child)::before {
        content: '';
        position: absolute;
        left: 15px;
        top: 32px;
        width: 2px;
        height: calc(100% - 16px);
        background: linear-gradient(180deg, var(--blue-mid), transparent);
    }

    .rs-num {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--blue);
        color: #fff;
        font-size: 14px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        z-index: 1;
        box-shadow: 0 2px 8px rgba(26, 86, 219, .3);
        transition: background .3s;
    }

    .rs-num.done {
        background: var(--success);
    }

    .rs-num.warn {
        background: var(--warning);
    }

    .rs-num.fail {
        background: var(--danger);
    }

    .rs-body {
        flex: 1;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 11px 13px;
        box-shadow: var(--shadow);
    }

    .rs-name {
        font-weight: 700;
        font-size: 13px;
        margin-bottom: 2px;
    }

    .rs-addr {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 7px;
    }

    .rs-foot {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 9px;
    }

    .rs-dist {
        font-size: 11px;
        color: var(--blue);
        font-weight: 600;
        background: var(--blue-light);
        padding: 2px 8px;
        border-radius: 10px;
    }

    .rs-nav {
        display: flex;
        gap: 6px;
    }

    .rs-nav a {
        flex: 1;
        padding: 7px 10px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 700;
        text-align: center;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        transition: all .15s;
        max-width: 140px;
    }

    .rs-nav .rw {
        background: #33CCFF;
        color: #fff;
    }

    .rs-nav .rw:hover {
        background: #1AB8E8;
    }

    .rs-nav .rg {
        background: #4285F4;
        color: #fff;
    }

    .rs-nav .rg:hover {
        background: #2A6FDB;
    }

    .empty-route {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
        gap: 10px;
    }

    .empty-ico {
        font-size: 52px;
        opacity: .2;
    }

    .empty-txt {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-muted);
        line-height: 1.5;
    }

    .loading-overlay {
        position: fixed;
        inset: 0;
        background: rgba(244, 247, 252, .9);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(6px);
    }

    .loading-overlay.hidden {
        display: none;
    }

    .spinner {
        width: 42px;
        height: 42px;
        border: 3px solid var(--blue-mid);
        border-top-color: var(--blue);
        border-radius: 50%;
        animation: spin .75s linear infinite;
        margin-bottom: 16px;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .load-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--blue);
        margin-bottom: 4px;
    }

    .load-sub {
        font-size: 12px;
        color: var(--text-muted);
    }

    .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(70px);
        background: var(--text);
        color: #fff;
        padding: 10px 20px;
        border-radius: 24px;
        font-size: 13px;
        font-weight: 600;
        z-index: 2000;
        white-space: nowrap;
        opacity: 0;
        transition: all .3s cubic-bezier(.4, 0, .2, 1);
        box-shadow: 0 4px 20px rgba(0, 0, 0, .2);
    }

    .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
    }

    .toast.ok {
        background: var(--success);
    }

    .toast.err {
        background: var(--danger);
    }

    .toast.info {
        background: var(--blue);
    }

    @media (max-width: 700px) {
        .app {
            grid-template-columns: 1fr;
        }

        .sidebar {
            display: none;
            position: fixed;
            inset: 59px 0 60px 0;
            z-index: 200;
            overflow-y: auto;
        }

        .sidebar.open {
            display: flex;
        }

        .logo-text span {
            display: none;
        }

        .hpill.hide-mob {
            display: none;
        }

        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            z-index: 250;
            box-shadow: 0 -4px 16px rgba(26, 86, 219, .1);
        }

        .mnav-btn {
            flex: 1;
            padding: 10px 4px;
            background: transparent;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .mnav-btn .mico {
            font-size: 20px;
        }

        .mnav-btn.active {
            color: var(--blue);
        }

        .main {
            padding-bottom: 60px;
        }

        .summary-cards {
            grid-template-columns: repeat(3, 1fr);
        }

        .sum-card:nth-child(4), .sum-card:nth-child(5) {
            display: none;
        }

        .rs-nav a {
            max-width: none;
        }
    }

    @media (min-width: 701px) {
        .mobile-nav {
            display: none;
        }
    }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">
                ChronoRoute 
                <span>v4</span>
            </div>
        </div>
        <div class="header-right">
            <div class="hpill" id="hTotal">📦 0</div>
            <div class="hpill" id="hDone">✅ 0</div>
            <div class="hpill hide-mob" id="hDist">📏 —</div>
            <button id="mobileMenuBtn" onclick="toggleSidebar()" style="display:none;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 10px;color:#fff;cursor:pointer;font-size:16px;">☰</button>
        </div>
    </header>

    <div class="prog-bar">
        <div class="prog-fill" id="progFill" style="width:0%"></div>
    </div>

    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="sb-form">
                <div class="sb-form-title">📦 Ajouter un arrêt</div>
                <div class="fg">
                    <label>Destinataire</label>
                    <input id="inName" type="text" placeholder="M. Dupont" autocomplete="off"/>
                </div>
                <div class="fg">
                    <label>Adresse complète</label>
                    <input id="inAddr" type="text" placeholder="12 rue de la Paix, Paris" autocomplete="off"/>
                </div>
                <div class="fg2">
                    <div>
                        <label>Créneau</label>
                        <select id="inSlot">
                            <option value="">Libre</option>
                            <option value="avant 10h">Avant 10h</option>
                            <option value="avant 12h">Avant 12h</option>
                            <option value="avant 13h">Avant 13h</option>
                            <option value="10h-14h">10h–14h</option>
                            <option value="14h-18h">14h–18h</option>
                        </select>
                    </div>
                    <div>
                        <label>Type</label>
                        <select id="inType">
                            <option value="standard">Standard</option>
                            <option value="express">Express 10h</option>
                            <option value="fragile">Fragile</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-add" onclick="addStop()">+ Ajouter le colis</button>
            </div>
            <div class="sb-list" id="sbList">
                <div class="no-stops">
                    <div class="ns-ico">📭</div>
                    Aucun arrêt ajouté
                </div>
            </div>
            <div class="sb-footer">
                <button class="btn btn-optimize" id="btnOpt" onclick="optimizeRoute()">⚡ Optimiser la tournée</button>
                <button class="btn btn-pdf" onclick="exportPDF()">📄 Exporter PDF</button>
                <button class="btn btn-reset" onclick="resetAll()">🗑️ Réinitialiser</button>
            </div>
        </div>

        <div class="main">
            <div class="tabs">
                <div class="tab active" id="tabMap" onclick="switchTab('map')">🗺️ Carte</div>
                <div class="tab" id="tabRoute" onclick="switchTab('route')">📋 Tournée</div>
            </div>
            <div class="map-wrap" id="mapWrap">
                <div id="map"></div>
                <button class="btn-gps" onclick="centerGPS()">📍</button>
            </div>
            <div class="route-panel hidden" id="routePanel">
                <div class="empty-route">
                    <div class="empty-ico">🚐</div>
                    <div class="empty-txt">
                        Ajoutez vos arrêts
                        <br>
                        puis optimisez la tournée
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mobile-nav">
        <button class="mnav-btn active" id="mnMap" onclick="mobileTab('map')">
            <span class="mico">🗺️</span>
            Carte
        </button>
        <button class="mnav-btn" id="mnRoute" onclick="mobileTab('route')">
            <span class="mico">📋</span>
            Tournée
        </button>
        <button class="mnav-btn" onclick="toggleSidebar()">
            <span class="mico">➕</span>
            Ajouter
        </button>
        <button class="mnav-btn" onclick="optimizeRoute()">
            <span class="mico">⚡</span>
            Optimiser
        </button>
    </div>

    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="load-title" id="loadTitle">Géocodage…</div>
        <div class="load-sub" id="loadSub">Localisation des adresses</div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
    let stops = [],
        map = null,
        markers = [],
        routeLine = null;
    let totalDistKm = 0,
        totalTimeMin = 0,
        gpsMarker = null;

    function wazeUrl(addr, coords) {
        return coords ? `https://waze.com/ul?ll=${coords.lat},${coords.lon}&navigate=yes` : `https://waze.com/ul?q=${encodeURIComponent(addr)}&navigate=yes`;
    }
    function gmapsUrl(addr, coords) {
        return coords ? `https://www.google.com/maps/dir/?api=1&destination=${coords.lat},${coords.lon}&travelmode=driving` : `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr)}&travelmode=driving`;
    }

    function initMap() {
        map = L.map('map', {
            zoomControl: false
        }).setView([48.8566, 2.3522], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 19
        }).addTo(map);
        L.control.zoom({
            position: 'topright'
        }).addTo(map);
    }

    function centerGPS() {
        if (!navigator.geolocation) {
            showToast('❌ GPS non disponible', 'err');
            return;
        }
        showToast('📡 Localisation…', 'info');
        navigator.geolocation.getCurrentPosition(pos => {
            const {latitude: lat, longitude: lng} = pos.coords;
            map.setView([lat, lng], 15);
            if (gpsMarker)
                gpsMarker.remove();
            const icon = L.divIcon({
                className: '',
                html: `<div style="width:16px;height:16px;border-radius:50%;background:#1A56DB;border:3px solid #fff;box-shadow:0 0 0 4px rgba(26,86,219,.25);"></div>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });
            gpsMarker = L.marker([lat, lng], {
                icon
            }).addTo(map).bindPopup('📍 Votre position').openPopup();
            showToast('📍 Position trouvée', 'ok');
        }, () => showToast('❌ Position refusée', 'err'));
    }

    async function geocode(addr) {
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`, {
            headers: {
                'Accept-Language': 'fr'
            }
        });
        const d = await r.json();
        if (!d.length)
            return null;
        return {
            lat: parseFloat(d[0].lat),
            lon: parseFloat(d[0].lon)
        };
    }
    async function getMatrix(coords) {
        const s = coords.map(c => `${c.lon},${c.lat}`).join(';');
        return (await fetch(`https://router.project-osrm.org/table/v1/driving/${s}?annotations=duration,distance`)).json();
    }
    async function getRoute(coords) {
        const s = coords.map(c => `${c.lon},${c.lat}`).join(';');
        return (await fetch(`https://router.project-osrm.org/route/v1/driving/${s}?overview=full&geometries=geojson`)).json();
    }
    function tsp(mx, n) {
        const vis = new Array(n).fill(false);
        const tour = [0];
        vis[0] = true;
        for (let i = 1; i < n; i++) {
            const last = tour[tour.length - 1];
            let best = -1,
                bestD = Infinity;
            for (let j = 0; j < n; j++)
                if (!vis[j] && mx[last][j] < bestD) {
                    bestD = mx[last][j];
                    best = j;
                }
            vis[best] = true;
            tour.push(best);
        }
        return tour;
    }

    function addStop() {
        const name = document.getElementById('inName').value.trim();
        const addr = document.getElementById('inAddr').value.trim();
        const slot = document.getElementById('inSlot').value;
        const type = document.getElementById('inType').value;
        if (!name || !addr) {
            showToast('⚠️ Nom et adresse requis', 'err');
            return;
        }
        stops.push({
            id: Date.now(),
            name,
            addr,
            slot,
            type,
            status: null,
            coords: null,
            order: stops.length + 1
        });
        document.getElementById('inName').value = '';
        document.getElementById('inAddr').value = '';
        document.getElementById('inSlot').value = '';
        document.getElementById('inType').value = 'standard';
        renderSidebar();
        updateHeader();
        showToast(`📦 ${name} ajouté(e)`, 'ok');
    }

    async function optimizeRoute() {
        if (stops.length < 2) {
            showToast('⚠️ Minimum 2 arrêts', 'err');
            return;
        }
        const pri = {
            express: 0,
            fragile: 1,
            standard: 2
        };
        const slo = {
            'avant 10h': 0,
            'avant 12h': 1,
            'avant 13h': 2,
            '10h-14h': 3,
            '14h-18h': 4,
            '': 5
        };
        stops.sort((a, b) => {
            const dp = pri[a.type] - pri[b.type];
            if (dp !== 0)
                return dp;
            return (slo[a.slot] ?? 5) - (slo[b.slot] ?? 5);
        });
        document.getElementById('btnOpt').disabled = true;
        showLoading('Géocodage des adresses', `0 / ${stops.length}`);
        try {
            for (let i = 0; i < stops.length; i++) {
                updSub(`Adresse ${i + 1}/${stops.length} : ${stops[i].name}`);
                if (!stops[i].coords) {
                    const geo = await geocode(stops[i].addr);
                    if (!geo) {
                        showToast(`❌ Adresse introuvable : ${stops[i].addr}`, 'err');
                        hideLoading();
                        document.getElementById('btnOpt').disabled = false;
                        return;
                    }
                    stops[i].coords = geo;
                }
                await sleep(300);
            }
            updTitle('Calcul distances');
            updSub('OSRM…');
            const mx = await getMatrix(stops.map(s => s.coords));
            updTitle('Optimisation');
            updSub('TSP…');
            const tour = tsp(mx.durations, stops.length);
            stops = tour.map((idx, i) => ({
                ...stops[idx],
                order: i + 1
            }));
            updTitle('Tracé itinéraire');
            updSub('Récupération…');
            const rd = await getRoute(stops.map(s => s.coords));
            totalDistKm = (rd.routes[0].distance / 1000).toFixed(1);
            totalTimeMin = Math.round(rd.routes[0].duration / 60);
            const legs = rd.routes[0].legs;
            stops.forEach((s, i) => {
                s.distFromPrev = i === 0 ? 0 : (legs[i - 1].distance / 1000).toFixed(2);
                s.timeFromPrev = i === 0 ? 0 : Math.round(legs[i - 1].duration / 60);
            });
            drawMap(rd.routes[0].geometry.coordinates);
            hideLoading();
            renderSidebar();
            renderRoute();
            updateHeader();
            showToast(`⚡ Optimisé — ${totalDistKm} km · ${totalTimeMin} min`, 'ok');
        } catch (e) {
            console.error(e);
            hideLoading();
            showToast('❌ Erreur réseau', 'err');
        }
        document.getElementById('btnOpt').disabled = false;
    }

    function stopColor(s) {
        if (s.status === 'livre')
            return {
                bg: '#0DA874',
                fg: '#fff'
            };
        if (s.status === 'absent')
            return {
                bg: '#F59E0B',
                fg: '#fff'
            };
        if (s.status === 'echec')
            return {
                bg: '#E53E3E',
                fg: '#fff'
            };
        return {
            bg: '#1A56DB',
            fg: '#fff'
        };
    }
    function makeIcon(s, i) {
        const {bg, fg} = stopColor(s);
        return L.divIcon({
            className: '',
            html: `<div style="width:40px;height:40px;border-radius:50%;background:${bg};color:${fg};font-family:'DM Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.22);">${i + 1}</div>`,
            iconSize: [40, 40],
            iconAnchor: [20, 20],
            popupAnchor: [0, -24]
        });
    }

    function popupHTML(s) {
        const tb = s.type === 'express' ? '<span class="tag t-express">EXPRESS</span>' : s.type === 'fragile' ? '<span class="tag t-fragile">FRAGILE</span>' : '<span class="tag t-standard">STD</span>';
        const slb = s.slot ? `<span class="tag t-time">🕐 ${s.slot}</span>` : '';
        const stb = s.status ? `<span class="tag t-${s.status}">${s.status === 'livre' ? '✅ Livré' : s.status === 'absent' ? '⚠️ Absent' : '❌ Échec'}</span>` : '';
        return `<div class="popup-inner"><div class="popup-name">${s.name}</div><div class="popup-addr">📍 ${s.addr}</div><div class="popup-tags">${tb}${slb}${stb}</div><div class="popup-nav"><a href="${wazeUrl(s.addr, s.coords)}" target="_blank" class="pw">🚗 Waze</a><a href="${gmapsUrl(s.addr, s.coords)}" target="_blank" class="pg">🗺️ Google Maps</a></div></div>`;
    }

    function drawMap(geoCoords) {
        markers.forEach(m => m.remove());
        markers = [];
        if (routeLine) {
            routeLine.remove();
            routeLine = null;
        }
        routeLine = L.polyline(geoCoords.map(c => [c[1], c[0]]), {
            color: '#1A56DB',
            weight: 5,
            opacity: .75
        }).addTo(map);
        stops.forEach((s, i) => {
            if (!s.coords)
                return;
            markers.push(L.marker([s.coords.lat, s.coords.lon], {
                icon: makeIcon(s, i)
            }).addTo(map).bindPopup(popupHTML(s), {
                maxWidth: 240
            }));
        });
        map.fitBounds(routeLine.getBounds(), {
            padding: [36, 36]
        });
    }
    function refreshMarkers() {
        markers.forEach(m => m.remove());
        markers = [];
        stops.forEach((s, i) => {
            if (!s.coords)
                return;
            markers.push(L.marker([s.coords.lat, s.coords.lon], {
                icon: makeIcon(s, i)
            }).addTo(map).bindPopup(popupHTML(s), {
                maxWidth: 240
            }));
        });
    }

    function renderSidebar() {
        const el = document.getElementById('sbList');
        if (!stops.length) {
            el.innerHTML = '<div class="no-stops"><div class="ns-ico">📭</div>Aucun arrêt ajouté</div>';
            return;
        }
        el.innerHTML = stops.map((s, i) => {
            const sc = s.status ? `s-${s.status}` : '';
            const tb = s.type === 'express' ? '<span class="tag t-express">EXPRESS</span>' : s.type === 'fragile' ? '<span class="tag t-fragile">FRAGILE</span>' : '<span class="tag t-standard">STD</span>';
            const slb = s.slot ? `<span class="tag t-time">🕐 ${s.slot}</span>` : '';
            const stb = s.status ? `<span class="tag t-${s.status}">${s.status === 'livre' ? '✅ Livré' : s.status === 'absent' ? '⚠️ Absent' : '❌ Échec'}</span>` : '';
            return `<div class="stop-card ${sc}">
      <div class="sc-head"><div class="sc-num">${i + 1}</div><div class="sc-info"><div class="sc-name">${s.name}</div><div class="sc-addr">${s.addr}</div></div><button class="sc-del" onclick="removeStop(${s.id})">✕</button></div>
      <div class="sc-tags">${tb}${slb}${stb}</div>
      <div class="sc-actions">
        <button class="sa-btn livre ${
            s.status === 'livre' ? 'active' : ''}" onclick="setStatus(${s.id},'livre')">✅ Livré</button>
        <button class="sa-btn absent ${s.status === 'absent' ? 'active' : ''}" onclick="setStatus(${s.id},'absent')">⚠️ Absent</button>
        <button class="sa-btn echec ${s.status === 'echec' ? 'active' : ''}" onclick="setStatus(${s.id},'echec')">❌ Échec</button>
      </div>
      <div class="sc-nav">
        <a href="${

            wazeUrl(s.addr, s.coords)}" target="_blank" class="nav-btn nav-waze">🚗 Waze</a>
        <a href="${gmapsUrl(s.addr, s.coords)}" target="_blank" class="nav-btn nav-gmaps">🗺️ Google Maps</a>
      </div>
    </div>`

            ;
        }).join('');
    }

    function renderRoute() {
        const panel = document.getElementById('routePanel');
        if (!stops.length) {
            panel.innerHTML = `<div class="empty-route"><div class="empty-ico">🚐</div><div class="empty-txt">Ajoutez vos arrêts<br>puis optimisez la tournée</div></div>`;
            return;
        }
        const done = stops.filter(s => s.status === 'livre').length,
            abs = stops.filter(s => s.status === 'absent').length,
            ech = stops.filter(s => s.status === 'echec').length,
            rem = stops.filter(s => !s.status).length;
        let html = `<div class="summary-cards">
    <div class="sum-card"><div class="sum-val">${stops.length}</div><div class="sum-lbl">Total</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--success)">${done}</div><div class="sum-lbl">Livrés</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--warning)">${abs}</div><div class="sum-lbl">Absents</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--danger)">${ech}</div><div class="sum-lbl">Échecs</div></div>
    <div class="sum-card"><div class="sum-val" style="color:var(--blue)">${rem}</div><div class="sum-lbl">Restants</div></div>
  </div>`
        ;
        if (totalDistKm)
            html += `<div class="route-info"><div class="ri-item"><span>📏</span><span>Distance</span><span class="ri-val">${totalDistKm} km</span></div><div class="ri-item"><span>⏱️</span><span>Durée</span><span class="ri-val">${totalTimeMin} min</span></div><div class="ri-badge">⚡ GPS OPTIMISÉ</div></div>`;
        html += `<div class="route-steps">`;
        stops.forEach((s, i) => {
            const nc = s.status === 'livre' ? 'done' : s.status === 'absent' ? 'warn' : s.status === 'echec' ? 'fail' : '';
            const tb = s.type === 'express' ? '<span class="tag t-express">EXPRESS</span>' : s.type === 'fragile' ? '<span class="tag t-fragile">FRAGILE</span>' : '';
            const slb = s.slot ? `<span class="tag t-time">🕐 ${s.slot}</span>` : '';
            const stb = s.status ? `<span class="tag t-${s.status}">${s.status === 'livre' ? '✅ Livré' : s.status === 'absent' ? '⚠️ Absent' : '❌ Échec'}</span>` : `<span class="tag" style="background:var(--blue-light);color:var(--blue);">🔄 En attente</span>`;
            const dist = s.distFromPrev > 0 ? `<span class="rs-dist">+${s.distFromPrev} km · ${s.timeFromPrev} min</span>` : i === 0 ? `<span class="rs-dist">🏁 Départ</span>` : '';
            html += `<div class="rs" style="animation-delay:${i * 45}ms">
      <div class="rs-num ${nc}">${i + 1}</div>
      <div class="rs-body">
        <div class="rs-name">${
            s.name}</div>
        <div class="rs-addr">📍 ${s.addr}</div>
        <div class="rs-foot">${tb}${slb}${stb}${dist}</div>
        <div class="rs-nav">
          <a href="${
            wazeUrl(s.addr, s.coords)}" target="_blank" class="rw">🚗 Waze</a>
          <a href="${gmapsUrl(s.addr, s.coords)}" target="_blank" class="rg">🗺️ Google Maps</a>
        </div>
      </div>
    </div>`


            ;
        });
        html += `</div>`;
        panel.innerHTML = html;
        updateProgress();
    }

    function setStatus(id, st) {
        const s = stops.find(s => s.id === id);
        if (!s)
            return;
        s.status = s.status === st ? null : st;
        renderSidebar();
        renderRoute();
        refreshMarkers();
        updateHeader();
        updateProgress();
    }
    function removeStop(id) {
        stops = stops.filter(s => s.id !== id);
        renderSidebar();
        renderRoute();
        refreshMarkers();
        updateHeader();
        updateProgress();
    }

    function exportPDF() {
        if (!stops.length) {
            showToast('⚠️ Aucune tournée', 'err');
            return;
        }
        const {jsPDF} = window.jspdf;
        const doc = new jsPDF();
        const now = new Date().toLocaleDateString('fr-FR', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        const done = stops.filter(s => s.status === 'livre').length,
            abs = stops.filter(s => s.status === 'absent').length,
            ech = stops.filter(s => s.status === 'echec').length;
        doc.setFillColor(26, 86, 219);
        doc.rect(0, 0, 210, 24, 'F');
        doc.setFillColor(255, 209, 0);
        doc.rect(0, 0, 5, 24, 'F');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(16);
        doc.setTextColor(255, 255, 255);
        doc.text('ChronoRoute — Feuille de Tournée', 14, 15);
        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(180, 200, 240);
        doc.text(`Générée le ${now}`, 14, 30);
        doc.setTextColor(60, 60, 60);
        doc.setFontSize(9);
        doc.text(`${stops.length} colis · ✅ ${done} · ⚠️ ${abs} · ❌ ${ech}${totalDistKm ? ` · 📏 ${totalDistKm} km` : ''}`, 14, 38);
        doc.setDrawColor(220, 230, 245);
        doc.line(10, 42, 200, 42);
        let y = 50;
        doc.setFillColor(26, 86, 219);
        doc.rect(10, y - 6, 190, 9, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8);
        doc.text('#', 14, y);
        doc.text('DESTINATAIRE', 22, y);
        doc.text('ADRESSE', 72, y);
        doc.text('CRÉNEAU', 132, y);
        doc.text('TYPE', 158, y);
        doc.text('STATUT', 176, y);
        y += 8;
        stops.forEach((s, i) => {
            if (y > 272) {
                doc.addPage();
                y = 20;
            }
            if (i % 2 === 0) {
                doc.setFillColor(245, 248, 255);
                doc.rect(10, y - 5, 190, 8, 'F');
            }
            doc.setTextColor(15, 27, 45);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(8);
            doc.text(String(i + 1), 14, y);
            doc.text(s.name.substring(0, 22), 22, y);
            doc.text(s.addr.substring(0, 37), 72, y);
            doc.text(s.slot || '—', 132, y);
            doc.text(s.type === 'express' ? 'EXPRESS' : s.type === 'fragile' ? 'FRAGILE' : 'STD', 158, y);
            const [sr, sg, sb] = s.status === 'livre' ? [13, 168, 116] : s.status === 'absent' ? [245, 158, 11] : s.status === 'echec' ? [229, 62, 62] : [100, 120, 150];
            doc.setTextColor(sr, sg, sb);
            doc.setFont('helvetica', 'bold');
            doc.text(s.status === 'livre' ? 'LIVRÉ' : s.status === 'absent' ? 'ABSENT' : s.status === 'echec' ? 'ÉCHEC' : 'EN ATTENTE', 176, y);
            y += 9;
        });
        doc.setTextColor(150, 160, 180);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7);
        doc.text('ChronoRoute v4 — OpenStreetMap · OSRM · jsPDF', 14, y + 10);
        doc.save(`tournee_${new Date().toISOString().slice(0, 10)}.pdf`);
        showToast('📄 PDF exporté !', 'ok');
    }

    function switchTab(tab) {
        document.getElementById('tabMap').classList.toggle('active', tab === 'map');
        document.getElementById('tabRoute').classList.toggle('active', tab === 'route');
        document.getElementById('mapWrap').classList.toggle('hidden', tab !== 'map');
        document.getElementById('routePanel').classList.toggle('hidden', tab !== 'route');
        if (tab === 'map' && map)
            setTimeout(() => map.invalidateSize(), 60);
    }
    function mobileTab(tab) {
        switchTab(tab);
        document.getElementById('mnMap').classList.toggle('active', tab === 'map');
        document.getElementById('mnRoute').classList.toggle('active', tab === 'route');
        closeSidebar();
    }
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
    }
    function updateHeader() {
        document.getElementById('hTotal').textContent = `📦 ${stops.length}`;
        document.getElementById('hDone').textContent = `✅ ${stops.filter(s => s.status === 'livre').length}`;
        document.getElementById('hDist').textContent = totalDistKm ? `📏 ${totalDistKm} km` : '📏 —';
    }
    function updateProgress() {
        const t = stops.length,
            d = stops.filter(s => s.status === 'livre').length;
        document.getElementById('progFill').style.width = t ? (d / t * 100) + '%' : '0%';
    }
    function showLoading(t, s) {
        document.getElementById('loadTitle').textContent = t;
        document.getElementById('loadSub').textContent = s;
        document.getElementById('loadingOverlay').classList.remove('hidden');
    }
    function updTitle(t) {
        document.getElementById('loadTitle').textContent = t;
    }
    function updSub(s) {
        document.getElementById('loadSub').textContent = s;
    }
    function hideLoading() {
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
    function showToast(msg, type='info') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        clearTimeout(t._t);
        t._t = setTimeout(() => t.classList.remove('show'), 2800);
    }
    function resetAll() {
        if (!stops.length)
            return;
        if (!confirm('Réinitialiser toute la tournée ?'))
            return;
        stops = [];
        totalDistKm = 0;
        totalTimeMin = 0;
        markers.forEach(m => m.remove());
        markers = [];
        if (routeLine) {
            routeLine.remove();
            routeLine = null;
        }
        renderSidebar();
        renderRoute();
        updateHeader();
        updateProgress();
        showToast('🗑️ Réinitialisé', 'info');
    }
    function sleep(ms) {
        return new Promise(r => setTimeout(r, ms));
    }
    function checkMobile() {
        document.getElementById('mobileMenuBtn').style.display = window.innerWidth <= 700 ? 'block' : 'none';
    }
    window.onload = () => {
        initMap();
        checkMobile();
        window.addEventListener('resize', checkMobile);
    };
    </script>
</body>
</html>
