<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Delivery Tour</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:#c40000;
padding:15px;
text-align:center;
font-weight:bold;
}

#map{
height:300px;
}

.container{
padding:15px;
}

button{
padding:10px;
margin:5px;
border:none;
background:#c40000;
color:white;
border-radius:6px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
}

.stop{
background:#1c1c1c;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

</style>

</head>

<body>

<header>
Delivery Tour
</header>

<div id="map"></div>

<div class="container">

<h3>Ajouter livraison</h3>

<input id="adresse" placeholder="Adresse">

<input id="client" placeholder="Client">

<input id="tel" placeholder="Téléphone">

<textarea id="note" placeholder="digicode, étage..."></textarea>

<button onclick="addStop()">Ajouter</button>

<hr>

<input type="file" id="csvFile" accept=".csv">

<button onclick="shareTour()">Partager tournée</button>

<button onclick="generateQR()">QR Code</button>

<div id="qrcode"></div>

<hr>

<h3>Tournée</h3>

<div id="stops"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>

const SAVE_KEY="delivery_tour";

let stops=
JSON.parse(localStorage.getItem(SAVE_KEY)) || [];

let map=L.map('map').setView([48.8566,2.3522],11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

function save(){
localStorage.setItem(SAVE_KEY,JSON.stringify(stops));
}

function addStop(){

let stop={
adresse:adresse.value,
client:client.value,
tel:tel.value,
note:note.value,
status:"pending"
};

stops.push(stop);

save();
render();

adresse.value="";
client.value="";
tel.value="";
note.value="";
}

function render(){

const container=document.getElementById("stops");

container.innerHTML="";

stops.forEach((s,i)=>{

let div=document.createElement("div");
div.className="stop";

div.innerHTML=`

<b>${s.client}</b><br>

${s.adresse}<br>

${s.note}<br><br>

<a href="tel:${s.tel}">
<button>📞 Appeler</button>
</a>

<button onclick="navigate('${s.adresse}')">
🧭 Naviguer
</button>

<input type="file" accept="image/*"
onchange="uploadPhoto(event,${i})">

<canvas id="sig${i}" width="300" height="100"
style="background:white"></canvas>

<button onclick="saveSignature(${i})">
Signature OK
</button>

<button onclick="removeStop(${i})">
Supprimer
</button>

`;

container.appendChild(div);

let canvas=
document.getElementById("sig"+i);

let pad=new SignaturePad(canvas);

s.pad=pad;

});

}

function removeStop(i){

stops.splice(i,1);

save();
render();
}

function navigate(adresse){

let url=
"https://www.google.com/maps/dir/?api=1&destination="
+encodeURIComponent(adresse);

window.open(url);

}

function uploadPhoto(e,i){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(evt){

stops[i].photo=evt.target.result;

save();

};

reader.readAsDataURL(file);

}

function saveSignature(i){

let data=stops[i].pad.toDataURL();

stops[i].signature=data;

save();

alert("Signature enregistrée");

}

document
.getElementById("csvFile")
.addEventListener("change",function(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(evt){

let lines=evt.target.result.split("\n");

lines.forEach(line=>{

let parts=line.split(",");

if(parts[0]){

stops.push({

adresse:parts[0],
client:parts[1]||"",
tel:parts[2]||"",
note:"",
status:"pending"

});

}

});

save();
render();

};

reader.readAsText(file);

});

function shareTour(){

let data=btoa(JSON.stringify(stops));

let url=
location.origin+
location.pathname+
"?tour="+data;

navigator.clipboard.writeText(url);

alert("Lien copié");

}

function generateQR(){

let data=btoa(JSON.stringify(stops));

let url=
location.origin+
location.pathname+
"?tour="+data;

document.getElementById("qrcode").innerHTML="";

new QRCode(
document.getElementById("qrcode"),
url
);

}

function loadShared(){

let params=
new URLSearchParams(location.search);

if(params.get("tour")){

stops=
JSON.parse(atob(params.get("tour")));

save();
}

}

loadShared();
render();

</script>

</body>
</html>
